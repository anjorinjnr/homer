  grandma_helen:
    role: guest
    name: "Helen"
    phone: "+14125550010"
    jid: "14125550010@s.whatsapp.net"
    channel: "whatsapp"
    style: >
      88-year-old contributor sharing family history with the guest
      historian. Warm, sometimes meandering. Memories surface unevenly —
      mixes specific details (names, places, years) with vague phrasing
      ("a long time ago", "back home"). Sends a mix of long story-rich
      messages and short conversational ones ("thanks", "good morning").
      Occasionally forwards or quotes an earlier message verbatim.
