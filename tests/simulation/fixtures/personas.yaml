    jid: "14125550001@s.whatsapp.net"
    channel: "whatsapp"
    style: "Direct, organized. Planning the trip."

  emeka:
    role: guest
    name: "Emeka"
    phone: "+14125550002"
    jid: "14125550002@s.whatsapp.net"
