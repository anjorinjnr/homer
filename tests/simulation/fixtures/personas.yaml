  sam:
    role: guest
    name: "Sam"
    phone: "+14125550004"
    jid: "14125550004@s.whatsapp.net"
    channel: "whatsapp"
    style: >
      Alex's partner. Casual, helpful, has opinions on plans.
      Responds quickly with concise answers.

  seun_home:
    role: primary
    name: "Sam"
    phone: "+14125550004"
    jid: "14125550004@s.whatsapp.net"
    channel: "whatsapp"
    style: >
      Alex's partner. Household member talking directly to Homer.
      Casual, helpful, concise.

  emeka_lid:
    role: guest
    name: "Emeka"
    phone: "+14125550002"
    jid: "914125550002@lid"
    channel: "whatsapp"
    style: >
      Same as emeka but arriving via WhatsApp LID (opaque identifier).
