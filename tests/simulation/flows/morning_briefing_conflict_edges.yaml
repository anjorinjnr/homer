name: "Morning Briefing — Conflict Edges (stress: pile-up, back-to-back, all-day)"
event_id: "sim_morning_briefing_conflict_edges"
event_name: "Morning Briefing Conflict Edges Simulation"
model: "gemini/gemini-3.1-pro-preview"

# What this flow proves
# ─────────────────────
# Stress test for the conflict-rendering layer. Three challenging
# shapes the basic conflicts flow doesn't cover:
#
#   1. THREE-WAY PILE-UP. A, B, C all overlap in the same window. The
#      brief should surface this as one consolidated heads-up — not
#      three separate "A vs B / A vs C / B vs C" lines. Or if it does
#      list pairs, it must be clear they're the same time block.
#
#   2. BACK-TO-BACK EVENTS (NOT a conflict). 5pm-6pm followed by
#      6pm-7pm share an endpoint but do NOT overlap. The brief must
#      NOT flag these as a conflict — the `conflicts` array is empty
#      for them at the data layer; the renderer must not invent one.
#
#   3. ALL-DAY vs TIMED (NOT a conflict). An all-day "Spring Break"
#      and a 9am Standup don't physically double-book. _detect_conflicts
#      excludes all-day events; the renderer must not add them.
#
# Plus a basic two-way conflict to anchor the section so we can tell
# the renderer produced the section at all (no false negatives).

