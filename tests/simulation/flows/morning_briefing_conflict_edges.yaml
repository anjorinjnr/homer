heartbeat_md: |
  # Heartbeat Tasks

  RULE 1 — DO NOT WRITE TEXT.
  RULE 2 — The ONLY way to communicate with users is the message tool.
  RULE 3 — SKIP means stop.
  RULE 4 — Empty results mean silence.

  ## User Tasks

  ### Morning briefing
  Type: system
  Schedule: 2026-01-01 07:00
  Recur: every 1 day
  Recipients: primary:whatsapp

  ## Completed

beats:
  - actor: alex
    heartbeat: true
    message: "Morning briefing (system)"
    expect:
      tools_used: ["exec", "message"]
      message_channels: ["whatsapp"]
      max_tool_calls: 16
      message_patterns:
        # Conflicts section anchor
        - "(?i)(conflict|double[- ]?book|overlap)"
        # Three-way pile-up: at least two of the three titles must appear
        # so we know the morning pile-up surfaced (a single combined line
        # naming all three is also accepted).
        - "(?i)strategy review"
        - "(?i)1:1"
        - "(?i)vendor call"
        # Cross-account conflict at 2pm
        - "(?i)dentist"
        - "(?i)lunch with vendor"
        # Account labels for the cross-account case
        - "(?i)(personal|work|primary)"
      message_patterns_forbidden:
        # ── Back-to-back must NOT register as a conflict ────────────
        # School pickup (5-6pm) and Soccer practice (6-7pm) share an
        # endpoint but don't overlap. _detect_conflicts excluded them.
        # The renderer must not fabricate a conflict line about them.
        - "(?i)school pickup.{0,40}vs.{0,40}soccer"
        - "(?i)soccer.{0,40}vs.{0,40}school pickup"
        # ── All-day Spring Break vs timed must NOT register ────────
        - "(?i)spring break.{0,40}vs.{0,40}strategy"
        - "(?i)spring break.{0,40}conflict"
        # Raw schema leaks
        - "is_opaque"
        - "both_opaque"
        - "cross_account"
        - "start_minutes"
        - "event_a"
      tool_sequence:
        - pattern: "morning_briefing\\.py"
        - pattern: "tasks_update\\.py --tick"
    note: >
      Conflict edges: a three-way 9-10:30am pile-up (Strategy review +
      1:1 + Vendor call), a back-to-back pair (5pm + 6pm — NOT a
      conflict), an all-day event alongside timed events (NOT a
      conflict), and one cross-account conflict at 2pm. The renderer
      must surface the pile-up and the cross-account conflict, must
      NOT invent conflicts for the back-to-back or all-day cases.
