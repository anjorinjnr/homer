name: "Morning Briefing — Format, Reminders, Per-User Style"
event_id: "sim_morning_briefing"
event_name: "Morning Briefing Simulation"
model: "gemini/gemini-3.1-pro-preview"

# What this flow proves
# ─────────────────────
# 1. Agentic + system tasks MUST NOT appear in the Reminders section.
#    Only plain reminder tasks (no Type field) should surface.
# 2. Action items from email_action_items.py must appear as a section.
# 3. Alex has no briefing_style → gets the default emoji/motivation presentation.
# 4. Sam has briefing_style = "plain bullets, no emoji, skip the motivation line"
#    → gets plain bullets with NO emoji and NO motivation line.
# 5. Because Alex's message includes a motivation line, Homer must exec
#    morning_briefing.py --log-motivation "<line>" exactly once after sending.
#
# The fixture at tests/simulation/fixtures/context/users.yaml already seeds:
#   - Alex (admin, whatsapp 14125550001)  — no briefing_style
#   - Sam (member, whatsapp 14125550004) — briefing_style above

mock_tools:
  # Full morning_briefing.py output (raw JSON, no formatting). One agentic task
  # and one system task are included in `reminders` for the "must be filtered"
  # check — in production those are filtered by morning_briefing.py itself, so
  # the mock here stays faithful and only returns true user reminders.
  - pattern: "morning_briefing\\.py(?! --log-motivation)"
    response: |
      {
        "type": "morning_briefing",
        "date": "2026-04-20",
        "today_events": [
          {"title": "Maya swim class", "date": "2026-04-20", "time": "2:00 PM", "display_date": "Today", "display_time": "2pm"},
          {"title": "Dentist — Alex", "date": "2026-04-20", "time": "4:30 PM", "display_date": "Today", "display_time": "4:30pm"}
        ],
        "week_events": [
          {"title": "Maya karate", "date": "2026-04-21", "time": "4:00 PM", "display_date": "Tomorrow", "display_time": "4pm"},
          {"title": "HVAC maintenance visit", "date": "2026-04-22", "time": "10:00 AM", "display_date": "Wed Apr 22", "display_time": "10am"},
          {"title": "Pool cover install", "date": "2026-04-24", "time": "all-day", "display_date": "Fri Apr 24"}
        ],
        "action_items": [
          {
            "subject": "Anytown water bill",
            "sender": "waterbills@example.com",
            "action": "Pay by 05/04/2026",
            "urgency": "this_week",
            "display_urgency": "this week"
          },
          {
            "subject": "Enrollment contract — Maya",
            "sender": "admin@school.example.com",
            "action": "Complete and return",
            "urgency": "today",
            "display_urgency": "today"
          }
        ],
        "reminders": [
          {
            "description": "Replace upstairs HVAC filter",
            "schedule": "2026-04-22 09:00",
            "display_when": "9am Wed Apr 22",
            "recipients": "14125550001:whatsapp"
          },
          {
            "description": "Pick up dry cleaning",
            "schedule": "2026-04-23 17:00",
            "display_when": "5pm Thu Apr 23",
            "recipients": "14125550001:whatsapp,14125550004:whatsapp"
          }
        ],
        "users": [
          {"name": "Alex"},
          {"name": "Sam", "briefing_style": "plain bullets, no emoji, skip the motivation line"}
        ],
        "recent_motivations": [
          "Little wins add up — have a great one.",
          "Make today count, friend.",
          "Here's to a smooth Sunday."
        ]
      }

  # The log-motivation call after the briefing message is sent.
  - pattern: "morning_briefing\\.py --log-motivation"
    response: |
      {"status": "logged", "kept": 4}

  # tasks_update tick after the briefing is delivered.
  - pattern: "tasks_update\\.py --tick"
    response: |
      {"status": "ticked"}

heartbeat_md: |
  # Heartbeat Tasks

  This file is checked every 30 minutes by your nanobot agent.

  ## CRITICAL: Silent Mode Rules

  You are a background process. You are NOT in a conversation. There is no user waiting for a reply.

  RULE 1 — DO NOT WRITE TEXT. Any text you write gets sent to users as a message. This is a bug.
  Your response must contain ONLY tool calls (exec or message). Zero words. Zero sentences. Nothing.

  RULE 2 — The ONLY way to communicate with users is the message tool.
  Only call message when you have real content to deliver (an email alert, the morning briefing, a due reminder).

  RULE 3 — SKIP means stop. If any exec output starts with "SKIP:", tick the task and write nothing else.

  RULE 4 — Empty results mean silence. No emails → tick, no message. No due tasks → no message.

  ## User Tasks

  System tasks (Type: system): run the task's exec per Heartbeat Execution rules in AGENTS.md, then tick.

  ### Morning briefing
  Type: system
  Schedule: 2026-01-01 07:00
  Recur: every 1 day
  Recipients: primary:whatsapp,sam:whatsapp

  ## Completed

beats:
  # Single beat: heartbeat fires → Homer must run morning_briefing.py,
  # format and send one message per recipient (with per-user style),
  # log the motivation (once, because only Alex gets one), and tick.
  - actor: alex
    heartbeat: true
    message: "Morning briefing (system)"
    expect:
      tools_used: ["exec", "message"]
      message_channels: ["whatsapp"]
      message_channels_forbidden: ["email", "telegram"]
      # Both recipients must get a message on whatsapp
      message_chat_ids:
        - "14125550001"
        - "14125550004"
      # Must NOT surface any internal task descriptions or generic system labels
      # (these would indicate system/agentic tasks leaking into reminders).
      message_patterns_forbidden:
        - "Gmail scan"
        - "Type: system"
        - "Type: agentic"
        # Raw formats that should NEVER appear — if Homer uses these, it ignored
        # the display_* fields and fell back to raw data.
        - "14:00"        # 24h time
        - "09:00"        # 24h time
        - "17:00"        # 24h time
        - "this_week"    # machine urgency string with underscore
        - "2026-04-22 09:00"  # ISO schedule string
        - "2026-04-23 17:00"
      # Every message must surface the action items and reminders, and the
      # user-friendly display formats (at least one friendly token proves use).
      message_patterns:
        - "(?i)water bill"
        - "(?i)enrollment"
        - "(?i)hvac filter"
        - "(?i)dry cleaning"
        - "(?i)today"     # relative date
        - "(?i)tomorrow"  # Maya karate is Tomorrow
      tool_sequence:
        - pattern: "morning_briefing\\.py"
          note: "Must fetch briefing data first"
        - pattern: "morning_briefing\\.py --log-motivation"
          note: "Must log the motivation line after sending (Alex gets the default style with motivation)"
        - pattern: "tasks_update\\.py --tick"
          note: "Must tick the Morning briefing task after sending"
      # Generous cap — Homer sometimes explores the filesystem for chat_ids even
      # though manage_users.py list returns them. That's an orthogonal efficiency
      # concern; this eval guards the briefing *format*, not exec-call efficiency.
      max_tool_calls: 16
    note: >
      Homer runs morning_briefing.py, formats one message per recipient honoring
      per-user briefing_style (Alex default emoji+motivation; Sam plain/no-emoji/no-motivation),
      logs the motivation exactly once, then ticks the task. Must never route via
      email or telegram, must never leak system/agentic task descriptions into reminders.
