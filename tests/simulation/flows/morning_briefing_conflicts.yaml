name: "Morning Briefing — Conflict Rendering Rules"
event_id: "sim_morning_briefing_conflicts"
event_name: "Morning Briefing Conflicts Simulation"
model: "gemini/gemini-3.1-pro-preview"

# What this flow proves
# ─────────────────────
# Regression guard for the brief's conflict rendering rules. Verifies three
# distinct conflict shapes get rendered correctly in ONE morning brief:
#
#   1. ONE-SIDE-OPAQUE conflict (the 2026-05-12 production bug):
#      A titled event clashes with a free/busy-only block from a shared
#      work calendar. The opaque side has no title (`(busy)` placeholder)
#      and must be rendered as "busy block on <calendar>", NEVER as the
#      literal "(busy)" or "(no title)".
#
#   2. BOTH-OPAQUE conflict (the tone-down rule):
#      Two free/busy blocks overlap. The model must NOT invent titles —
#      it should say something like "you're double-booked X-Y across two
#      work blocks" without claiming to know what either is.
#
#   3. CROSS-ACCOUNT conflict (the account-label rule):
#      Two titled events overlap, one on each linked account. The model
#      must include both account labels ([work] / [personal] or similar)
#      so the user immediately sees which calendars clash.
#
# Additional invariants:
#   - Conflicts section appears FIRST in the brief (heads-up before the
#     user reads past today's schedule).
#   - Opaque events do NOT appear as standalone entries in the Today /
#     This week sections — they only matter for conflict detection.
#
# Complementary structural tests in:
#   tests/test_morning_briefing.py → class TestConflictDetection
#   tests/test_calendar_fetch.py → opaque title placeholder tests

