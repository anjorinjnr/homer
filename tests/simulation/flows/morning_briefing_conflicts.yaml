heartbeat_md: |
  # Heartbeat Tasks

  This file is checked every 30 minutes by your nanobot agent.

  ## CRITICAL: Silent Mode Rules

  You are a background process. You are NOT in a conversation.

  RULE 1 — DO NOT WRITE TEXT. Your response must contain ONLY tool calls.
  RULE 2 — The ONLY way to communicate with users is the message tool.
  RULE 3 — SKIP means stop. Tick the task and write nothing else.
  RULE 4 — Empty results mean silence.

  ## User Tasks

  ### Morning briefing
  Type: system
  Schedule: 2026-01-01 07:00
  Recur: every 1 day
  Recipients: primary:whatsapp

  ## Completed

beats:
  - actor: alex
    heartbeat: true
    message: "Morning briefing (system)"
    expect:
      tools_used: ["exec", "message"]
      message_channels: ["whatsapp"]
      message_chat_ids:
        - "14125550001"
      max_tool_calls: 16
      message_patterns:
        # ── Conflicts section must be present, surfaced visibly ─────
        # The exact emoji is up to the model; the word "conflict" or
        # "double-booked" anchors the section.
        - "(?i)(conflict|double[- ]?book|overlap)"

        # ── Conflict 1: one-side-opaque (Kemi karate vs work block) ─
        - "(?i)karate"
        # The opaque side must be described in a meaningful way —
        # "busy block", "work block", or referencing the calendar name
        # ("Work Calendar"). Any of these proves the agent didn't dump
        # the "(busy)" placeholder verbatim.
        - "(?i)(busy block|work block|work calendar)"

        # ── Conflict 2: cross-account (Project review vs Dentist) ───
        - "(?i)project review"
        - "(?i)dentist"
        # Cross-account label visibility — the user must see WHICH
        # accounts clash. Account names appear in either conflict line.
        - "(?i)(personal|work|primary)"

        # ── Conflict 3: both-opaque ─────────────────────────────────
        # The tone-down rule fires here. The message should reference
        # being "double-booked" or similar, without inventing fake
        # titles for either side. Most accurate ways: "two work blocks
        # 9–10am", "you're blocked twice in the 9am hour", etc.
        - "(?i)(double[- ]?book|two .{0,30}(work|busy) ?(block|appointment)|9.{0,5}(am|to))"

      message_patterns_forbidden:
        # The literal placeholder must never leak — this is the bug
        # we landed the fix for on 2026-05-12.
        - "\\(no title\\)"
        - "\\(busy\\)"
        # Raw schema leaks
        - "is_opaque"
        - "both_opaque"
        - "cross_account"
        - "accounts_attempted"
        - "start_minutes"
        - "event_a"
        - "event_b"
        # The opaque events from 9-10am must NOT appear in the regular
        # Today section — they only belong in the conflicts section.
        # If "9am — (busy)" or "9am — busy" appears as a standalone
        # bullet outside the conflicts framing, the skip-opaque rule
        # failed. We look for a tell: a bullet line that lists 9am
        # paired with the word "busy" but NOT next to "conflict" /
        # "overlap" / "double". Approximate via a forbidden phrase:
        - "(?im)^\\s*[-*•]\\s*9[:\\.]?\\d{0,2}\\s?(am)?\\s*[—\\-]\\s*\\(?busy\\)?\\s*$"

      tool_sequence:
        - pattern: "morning_briefing\\.py"
          note: "Must fetch briefing data"
        - pattern: "tasks_update\\.py --tick"
          note: "Must tick after sending"
    note: >
      Conflict rendering: Homer must surface all three conflicts (one-opaque,
      cross-account, both-opaque) in the Conflicts section, render the opaque
      side as "busy block on <calendar>" not "(busy)" / "(no title)", tone
      down the both-opaque case to "double-booked" without inventing titles,
      and SKIP opaque events from the Today section entirely.
